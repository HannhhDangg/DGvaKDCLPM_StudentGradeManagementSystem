<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Đào tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h4 class="text-primary"><i class="fas fa-graduation-cap"></i> EduManage</h4>
            <p class="text-muted">Đăng nhập vào hệ thống</p>
        </div>

        {#if error}
        <div id="errorMsg" class="alert alert-danger p-2 text-center" role="alert">
            Tài khoản hoặc mật khẩu không chính xác!
        </div>
        {/if}

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Tên đăng nhập</label>
                <input type="text" name="username" id="username" class="form-control"
                    placeholder="Nhập tài khoản Admin..." required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Nhập 123456..."
                    required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 fw-bold">Đăng nhập</button>
        </form>
    </div>
</body>

</html>

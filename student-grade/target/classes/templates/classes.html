<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Lớp học - Hệ thống Đào tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #34495e;
            color: #fff;
            border-left: 4px solid #3498db;
        }

        .sidebar i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            padding: 30px;
        }

        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, .075);
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4 pb-3 border-bottom border-secondary">
                    <i class="fas fa-graduation-cap text-info"></i> EduManage
                </h4>
                <a href="/teacher"><i class="fas fa-chalkboard-teacher"></i> Lớp của tôi</a>
                <a href="/classes" class="active"><i class="fas fa-tasks"></i> Quản lý Lớp học</a>
                <a href="/login" class="text-danger mt-5 border-top border-secondary pt-3"><i
                        class="fas fa-sign-out-alt"></i> Đăng xuất</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3"><i class="fas fa-chalkboard-teacher text-primary me-2"></i>Danh sách Lớp học</h2>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-end mb-4">
                            <button class="btn btn-primary shadow-sm" data-bs-toggle="modal"
                                data-bs-target="#addClassModal">
                                <i class="fas fa-plus-circle me-1"></i> Thêm lớp học
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Tên Lớp Học</th>
                                        <th>Mô tả</th>
                                        <th>Giáo viên (ID)</th>
                                        <th class="text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {#for classroom in classes}
                                    <tr>
                                        <td>{classroom.id}</td>
                                        <td class="fw-bold text-primary">{classroom.name}</td>
                                        <td class="text-muted">{classroom.description}</td>
                                        <td>{classroom.teacherId ?: 'Chưa phân công'}</td>
                                        <td class="text-center">
                                            <button class="btn btn-sm btn-outline-primary" title="Sửa"><i
                                                    class="fas fa-edit"></i></button>
                                            <form action="/classes/delete/{classroom.id}" method="post"
                                                style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa"
                                                    onclick="return confirm('Cảnh báo: Xóa lớp học này sẽ xóa luôn dữ liệu ghi danh của sinh viên trong lớp. Bạn có chắc chắn?')">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    {/for}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Lớp học -->
    <div class="modal fade" id="addClassModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/classes/add" method="post">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title"><i class="fas fa-plus me-2"></i>Thêm Lớp học mới</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên lớp học</label>
                            <input type="text" name="name" class="form-control" required placeholder="VD: Lớp Toán 01">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Phòng học, lịch học..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Lưu thông
                            tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Tổng quan - Hệ thống Đào tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #34495e;
            color: #fff;
            border-left: 4px solid #3498db;
        }

        .sidebar i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            padding: 30px;
        }

        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, .075);
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4 pb-3 border-bottom border-secondary">
                    <i class="fas fa-graduation-cap text-info"></i> EduManage
                </h4>
                <a href="/dashboard" class="active"><i class="fas fa-chart-pie"></i> Tổng quan</a>
                <a href="/users"><i class="fas fa-users-cog"></i> Quản lý Người dùng</a>
                <a href="/subjects"><i class="fas fa-book"></i> Quản lý Môn học</a>
                <a href="/login" class="text-danger mt-5 border-top border-secondary pt-3"><i
                        class="fas fa-sign-out-alt"></i> Đăng xuất</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3"><i class="fas fa-chart-pie text-primary me-2"></i>Tổng quan hệ thống</h2>
                    <div class="user-info">
                        <span class="text-muted">Xin chào,</span> <strong>Admin</strong>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary mb-3 text-center shadow">
                            <div class="card-body">
                                <h5 class="card-title">Tổng Người dùng</h5>
                                <h2 id="totalStudents">{total}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3 text-center shadow">
                            <div class="card-body">
                                <h5 class="card-title">Điểm Trung Bình</h5>
                                <h2>{average}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-info mb-3 text-center shadow">
                            <div class="card-body">
                                <h5 class="card-title">Tỷ Lệ Đỗ</h5>
                                <h2>{passRatio}%</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4 justify-content-center">
                    <div class="col-md-6 text-center">
                        <h4>Phân bổ điểm số (Pie Chart)</h4>
                        <canvas id="gradeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('gradeChart').getContext('2d');
        const gradeData = { A: Number('{grades.A ?: 0}'), B: Number('{grades.B ?: 0}'), C: Number('{grades.C ?: 0}'), D: Number('{grades.D ?: 0}'), F: Number('{grades.F ?: 0}') };
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['A (Xuất sắc)', 'B (Giỏi)', 'C (Khá)', 'D (Trung bình)', 'F (Trượt)'],
                datasets: [{ data: [gradeData.A, gradeData.B, gradeData.C, gradeData.D, gradeData.F], backgroundColor: ['#28a745', '#17a2b8', '#ffc107', '#fd7e14', '#dc3545'] }]
            }
        });
    </script>
</body>

</html>

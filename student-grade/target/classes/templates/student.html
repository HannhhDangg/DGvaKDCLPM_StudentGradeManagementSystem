<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Sinh viên - Hệ thống Đào tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #34495e;
            color: #fff;
            border-left: 4px solid #3498db;
        }

        .sidebar i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            padding: 30px;
        }

        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, .075);
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4 pb-3 border-bottom border-secondary">
                    <i class="fas fa-graduation-cap text-info"></i> EduManage
                </h4>
                <a href="/student" class="active"><i class="fas fa-chart-bar"></i> Kết quả học tập</a>
                <a href="#"><i class="fas fa-chalkboard"></i> Lớp học đang tham gia</a>
                <a href="#"><i class="fas fa-file-alt"></i> Bảng điểm chi tiết</a>
                <a href="/login" class="text-danger mt-5 border-top border-secondary pt-3">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </div>

            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3"><i class="fas fa-user-graduate text-success me-2"></i>Cổng Thông Tin Sinh Viên</h2>
                    <div class="user-info">
                        <span class="text-muted">Xin chào,</span> <strong>Sinh Viên</strong>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card bg-success text-white p-3 shadow-sm">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5>Điểm TB Tích lũy (GPA)</h5>
                                    <h2>3.2 / 4.0</h2>
                                </div>
                                <i class="fas fa-award fa-3x opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Bảng điểm học kỳ gần nhất</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Mã Môn</th>
                                        <th>Tên Môn Học</th>
                                        <th>Tín chỉ</th>
                                        <th>Điểm số</th>
                                        <th>Xếp loại</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>INT101</td>
                                        <td class="fw-bold">Lập trình cơ bản</td>
                                        <td>3</td>
                                        <td class="fw-bold text-success">8.5</td>
                                        <td><span class="badge bg-success">Giỏi (B+)</span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
